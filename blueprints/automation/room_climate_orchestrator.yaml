blueprint:
  name: Room Climate Orchestrator
  description: >
    Drives one or more minisplit heads to satisfy a desired-temperature dial. The dial can
    be a wall thermostat (its setpoint) or a plain input_number; room truth can come from an
    external sensor, the dial thermostat's own sensor, or the minisplit head. Outdoor
    temperature picks the armed side: cooling at/above the cool floor, heat-pump heat inside
    the HP window, idle otherwise. A fan-speed ladder scales airflow with distance from target.
  domain: automation
  source_url: https://github.com/chrisuthe/ha-blueprints/blob/main/blueprints/automation/room_climate_orchestrator.yaml
  input:
    dial_thermostat:
      name: Dial (thermostat or number)
      description: >
        The desired-temperature source. Either a climate entity (its target temp is the
        dial and its sensor is the room) or an input_number/number holding the desired temp.
      selector:
        entity:
          domain:
            - climate
            - input_number
            - number
    minisplits:
      name: Minisplit head(s)
      selector:
        entity:
          domain: climate
          multiple: true
    room_sensor:
      name: Room temperature sensor(s) (optional)
      description: >
        External sensor(s) giving true room temperature (averaged if several). Leave empty
        to use the dial thermostat's own sensor, or the minisplit head when the dial is a
        plain number.
      default: []
      selector:
        entity:
          domain: sensor
          multiple: true
    offset_helper:
      name: Offset helper
      description: input_number (−5…+5) shifting the room's effective target; written by schedule/warm-up glue automations. Stays 0 when unused.
      selector:
        entity:
          domain: input_number
    status_helper:
      name: Status helper
      description: input_text this automation writes its decision to on every evaluation.
      selector:
        entity:
          domain: input_text
    weather_entity:
      name: Weather source
      default: weather.pirateweather
      selector:
        entity:
          domain: weather
    cool_band:
      name: Cooling entry band (°F above dial)
      default: 1.0
      selector:
        number:
          min: 0.5
          max: 5
          step: 0.5
          unit_of_measurement: "°F"
    cool_outdoor_floor:
      name: Minimum outdoor temperature for cooling (°F)
      default: 60
      selector:
        number:
          min: 40
          max: 80
          step: 1
    cool_target_offset:
      name: Cool target offset (°F relative to dial)
      description: >
        Commanded cooling setpoint = dial + this. Sioux Falls uses −0.5 to stay above the
        boiler differential; the lake uses 0 (the dial is the desired room temperature).
      default: -0.5
      selector:
        number:
          min: -3
          max: 1
          step: 0.5
          unit_of_measurement: "°F"
    hp_offset:
      name: Heat target offset (°F above dial)
      default: 1.0
      selector:
        number:
          min: 0.5
          max: 3
          step: 0.5
          unit_of_measurement: "°F"
    hp_outdoor_floor:
      name: Minimum outdoor temperature for heat-pump heat (°F)
      default: 20
      selector:
        number:
          min: -20
          max: 50
          step: 1
    hp_outdoor_max:
      name: Maximum outdoor temperature for heat-pump heat (°F)
      description: Keep equal to the cooling floor so heat and cool are never armed together.
      default: 60
      selector:
        number:
          min: 40
          max: 80
          step: 1
    fan_auto_band:
      name: Fan auto band (°F)
      description: While cooling, fan stays on auto when the room is within this many degrees of the effective target.
      default: 1.5
      selector:
        number:
          min: 0.5
          max: 5
          step: 0.5
          unit_of_measurement: "°F"
    fan_step:
      name: Fan ladder step (°F)
      description: Each additional step of gap beyond the auto band raises the fan one tier.
      default: 1.0
      selector:
        number:
          min: 0.5
          max: 3
          step: 0.5
          unit_of_measurement: "°F"
    fan_tier_1:
      name: Fan tier 1 (first step above auto)
      description: Must be a valid fan_mode of the units. SF uses medium; the Della lake units also have medium.
      default: medium
      selector:
        text: {}
    fan_tier_2:
      name: Fan tier 2
      default: high
      selector:
        text: {}
    fan_tier_3:
      name: Fan tier 3 (max)
      description: SF units support Turbo; the Della lake units cap at high.
      default: Turbo
      selector:
        text: {}
    calibration_offset:
      name: Calibration offset (°F)
      description: Measured disagreement between the minisplit head sensor and the wall thermostat; added to the commanded heat target.
      default: 0
      selector:
        number:
          min: -5
          max: 5
          step: 0.5
          unit_of_measurement: "°F"
    idle_mode:
      name: Idle behavior
      default: "off"
      selector:
        select:
          options:
            - "off"
            - fan_only
    lockout_switch:
      name: Boiler lockout switch (Phase 2 — not driven yet)
      description: Reserved for the zone-panel interlock relay. Ignored by this version.
      default: []
      selector:
        entity:
          domain: switch
          multiple: true
mode: restart
max_exceeded: silent
triggers:
  - trigger: state
    entity_id: !input dial_thermostat
    attribute: temperature
  - trigger: state
    entity_id: !input dial_thermostat
    attribute: current_temperature
  - trigger: state
    entity_id: !input dial_thermostat
  - trigger: time_pattern
    minutes: "/1"
  - trigger: state
    entity_id: !input offset_helper
  - trigger: state
    entity_id: !input weather_entity
    attribute: temperature
  - trigger: state
    entity_id: !input minisplits
    to: unavailable
  - trigger: state
    entity_id: !input minisplits
    from: unavailable
  - trigger: homeassistant
    event: start
  - trigger: event
    event_type: automation_reloaded
conditions: []
actions:
  - variables:
      dial_entity: !input dial_thermostat
      minisplit_list: !input minisplits
      weather_ent: !input weather_entity
      offset_entity: !input offset_helper
      status_entity: !input status_helper
      room_sensor_list: !input room_sensor
      cool_band: !input cool_band
      cool_floor: !input cool_outdoor_floor
      cool_target_offset: !input cool_target_offset
      hp_offset: !input hp_offset
      hp_floor: !input hp_outdoor_floor
      hp_max: !input hp_outdoor_max
      cal: !input calibration_offset
      idle_mode: !input idle_mode
      fan_auto_band: !input fan_auto_band
      fan_step: !input fan_step
      fan_t1: !input fan_tier_1
      fan_t2: !input fan_tier_2
      fan_t3: !input fan_tier_3
      head: "{{ minisplit_list if minisplit_list is string else minisplit_list[0] }}"
      head_mode: "{{ states(head) }}"
      head_target: "{{ state_attr(head, 'temperature') | float(0) }}"
      head_fan: "{{ state_attr(head, 'fan_mode') }}"
      dial_is_climate: "{{ dial_entity.split('.')[0] == 'climate' }}"
      dial: >-
        {% if dial_is_climate %}{{ state_attr(dial_entity, 'temperature') }}{% else %}{{ states(dial_entity) }}{% endif %}
      room: >-
        {% if room_sensor_list | count > 0 %}{{ (room_sensor_list | map('states') | map('float', 0) | sum) / (room_sensor_list | count) }}{% elif dial_is_climate %}{{ state_attr(dial_entity, 'current_temperature') }}{% else %}{{ state_attr(head, 'current_temperature') }}{% endif %}
      outdoor: "{{ state_attr(weather_ent, 'temperature') }}"
      offset: "{{ states(offset_entity) | float(0) }}"
      eff: "{{ dial | float(0) + offset }}"
      desired_mode: >-
        {%- if dial in [none, 'unknown', 'unavailable'] or room in [none, 'unknown', 'unavailable'] or outdoor is none -%} none
        {%- elif dial | float(0) < 40 or room | float(0) < 40 -%} none
        {%- elif head_mode in ['unavailable', 'unknown'] -%} none
        {%- elif outdoor | float >= cool_floor | float -%}
          {%- if room | float >= eff + cool_band | float -%} cool
          {%- elif head_mode == 'cool' and room | float > eff - 0.5 -%} cool
          {%- else -%} idle
          {%- endif -%}
        {%- elif outdoor | float >= hp_floor | float and outdoor | float < hp_max | float -%}
          {%- if room | float <= eff + 0.5 -%} heat
          {%- elif head_mode == 'heat' and room | float < eff + hp_offset | float + 0.5 -%} heat
          {%- else -%} idle
          {%- endif -%}
        {%- else -%} idle
        {%- endif -%}
      desired_target: >-
        {%- if desired_mode == 'cool' -%}
          {{ [ [ eff + cool_target_offset | float, 62.5 ] | max, 86 ] | min }}
        {%- elif desired_mode == 'heat' -%}
          {{ [ [ eff + hp_offset | float + cal | float, 62.5 ] | max, 86 ] | min }}
        {%- else -%} 0
        {%- endif -%}
      desired_fan: >-
        {%- if desired_mode == 'cool' -%}
          {%- set gap = room | float - eff -%}
          {%- if gap <= fan_auto_band | float -%} auto
          {%- elif gap <= fan_auto_band | float + fan_step | float -%} {{ fan_t1 }}
          {%- elif gap <= fan_auto_band | float + 2 * fan_step | float -%} {{ fan_t2 }}
          {%- else -%} {{ fan_t3 }}
          {%- endif -%}
        {%- else -%} auto
        {%- endif -%}
  - action: input_text.set_value
    target:
      entity_id: !input status_helper
    data:
      value: >-
        {{ desired_mode }}{% if desired_mode in ['cool', 'heat'] %} → {{ desired_target }}{% endif %}{% if desired_mode == 'cool' %} fan {{ desired_fan }}{% endif %}
        | room {{ room | float(0) | round(1) }} dial {{ dial | float(0) | round(1) }}{% if offset != 0 %} ({{ '%+.1f' | format(offset) }}){% endif %} out {{ outdoor }}
        | {{ now().strftime('%H:%M') }}
  - choose:
      - conditions: "{{ desired_mode == 'none' }}"
        sequence:
          - stop: Missing dial/room/outdoor data or minisplit unavailable.
      - conditions: "{{ desired_mode == 'cool' }}"
        sequence:
          - if: "{{ head_mode != 'cool' }}"
            then:
              - action: climate.set_hvac_mode
                target:
                  entity_id: !input minisplits
                data:
                  hvac_mode: cool
              # Units drop a setpoint sent mid-mode-change; let them settle first.
              - delay: "00:00:03"
          - if: "{{ head_mode != 'cool' or (head_target - desired_target | float) | abs >= 0.6 }}"
            then:
              - action: climate.set_temperature
                target:
                  entity_id: !input minisplits
                data:
                  temperature: "{{ desired_target }}"
      - conditions: "{{ desired_mode == 'heat' }}"
        sequence:
          - if: "{{ head_mode != 'heat' }}"
            then:
              - action: climate.set_hvac_mode
                target:
                  entity_id: !input minisplits
                data:
                  hvac_mode: heat
              # Units drop a setpoint sent mid-mode-change; let them settle first.
              - delay: "00:00:03"
          - if: "{{ head_mode != 'heat' or (head_target - desired_target | float) | abs >= 0.6 }}"
            then:
              - action: climate.set_temperature
                target:
                  entity_id: !input minisplits
                data:
                  temperature: "{{ desired_target }}"
    default:
      - if: "{{ head_mode != idle_mode }}"
        then:
          - action: climate.set_hvac_mode
            target:
              entity_id: !input minisplits
            data:
              hvac_mode: "{{ idle_mode }}"
  # Never send fan commands toward an off unit — set_fan_mode WAKES a sleeping
  # minisplit into fan_only. Ladder applies in cool; normalization only when
  # idling in fan_only (heat is on anyway, so normalizing there is safe too).
  - if: >-
      {{ head_fan != desired_fan
         and (desired_mode in ['cool', 'heat']
              or (desired_mode == 'idle' and idle_mode == 'fan_only')) }}
    then:
      - action: climate.set_fan_mode
        target:
          entity_id: !input minisplits
        data:
          fan_mode: "{{ desired_fan }}"
